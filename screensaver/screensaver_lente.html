<!DOCTYPE html>
<html lang="nl">
<head>
  <title>Screensaver Lente - Berkay Blog</title>
  <meta name="keywords" content="Berkay blog, blog, berkay, De berkay blog, berkay screensaver, screensaver, screensaver berkay blog">
  <meta name="author" content="Berkay">
  <meta name="description" content="Een leuke blog met tips en tricks, gemaakt door Berkay">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="https://i.ibb.co/N6wZw4qN/favicon-32x32.png">
  <!-- Google Font: mooie klok-stijl -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* =============================================
       BASIS RESET & FULLSCREEN SETUP
    ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Cursor standaard verborgen (screensaver-stijl) */
      cursor: none;
    }

    /* Cursor zichtbaar maken als muis beweegt */
    body.show-cursor {
      cursor: default;
    }

    /* =============================================
       ACHTERGROND SLIDESHOW
       Twee lagen wisselen elkaar af via opacity-transitie
    ============================================= */
    .background {
      width: 100%;
      height: 100vh;
      background-size: cover;
      background-position: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: -10;
      /* Zachte overgang tussen afbeeldingen */
      transition: opacity 1.5s ease-in-out;
      opacity: 0;
    }

    /* Actieve achtergrond is zichtbaar */
    .background.active {
      opacity: 1;
      z-index: -1;
    }

    /* =============================================
       KLOK & DATUM
    ============================================= */
    #clock-container {
      position: fixed;
      top: 30px;
      left: 40px;
      z-index: 100;
      /* Subtiele schaduw voor leesbaarheid op alle achtergronden */
      text-shadow: 0 2px 12px rgba(0,0,0,0.7), 0 0 40px rgba(0,0,0,0.4);
      user-select: none;
    }

    #clock {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 4px;
      line-height: 1;
    }

    #date {
      font-family: 'Quicksand', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2px;
      margin-top: 6px;
    }

    /* =============================================
       SLUIT-KNOP (verschijnt als muis beweegt)
    ============================================= */
    #exit {
      display: none;
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10000000;
      cursor: pointer;
      /* Subtiele hover-animatie */
      transition: transform 0.2s, opacity 0.2s;
      opacity: 0.8;
    }

    #exit:hover {
      transform: scale(1.15) rotate(5deg);
      opacity: 1;
    }

    /* =============================================
       FULLSCREEN MODAL
    ============================================= */
    #fullscreenModal {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .modal-content {
      background: rgba(255,255,255,0.95);
      padding: 32px 28px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
      max-width: 320px;
      width: 90%;
      font-family: 'Quicksand', sans-serif;
    }

    .modal-content p {
      font-size: 1rem;
      color: #222;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .modal-buttons button {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #yesButton {
      background: #4caf50;
      color: white;
    }

    #yesButton:hover {
      background: #43a047;
      transform: scale(1.04);
    }

    #noButton {
      background: #e0e0e0;
      color: #333;
    }

    #noButton:hover {
      background: #bdbdbd;
      transform: scale(1.04);
    }

    /* =============================================
       FLASH EFFECT bij spatie-druk (kort wit flits)
    ============================================= */
    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      z-index: 5000;
      pointer-events: none;
      transition: opacity 0.08s ease-out;
    }

    #flash.active {
      opacity: 0.18;
    }
  </style>
</head>
<body>

  <!-- =============================================
       SLUIT-KNOP (zichtbaar als muis beweegt)
  ============================================= -->
  <div id="exit" onclick="closeFullscreen();" title="Volledig scherm verlaten">
    <img src="https://i.ibb.co/PY4WLf7/kruis.png" width="44px" height="44px" alt="Sluiten">
  </div>

  <!-- =============================================
       ACHTERGRONDEN (twee lagen voor cross-fade)
  ============================================= -->
  <div id="background1" class="background active"></div>
  <div id="background2" class="background"></div>

  <!-- Flash-overlay voor spatie-effect -->
  <div id="flash"></div>

  <!-- =============================================
       KLOK & DATUM
  ============================================= -->
  <div id="clock-container">
    <div id="clock"></div>
    <div id="date"></div>
  </div>

  <!-- =============================================
       FULLSCREEN MODAL
  ============================================= -->
  <div id="fullscreenModal">
    <div class="modal-content">
      <p>🌸 Wil je de screensaver in <strong>fullscreen</strong> bekijken?<br><small>Dit is aanbevolen voor de beste ervaring.</small></p>
      <div class="modal-buttons">
        <button id="yesButton">⛶ Fullscreen</button>
        <button id="noButton">Overslaan</button>
      </div>
    </div>
  </div>


  <!-- =============================================
       HOOFD JAVASCRIPT
  ============================================= -->
  <script>
    // ─────────────────────────────────────────────
    // 1. KLOK & DATUM — elke seconde bijwerken
    // ─────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');

      // Tijdformaat: UU:MM:SS
      document.getElementById('clock').textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

      // Datumformaat: DD-MM-JJJJ
      const dagen = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
      document.getElementById('date').textContent =
        `${dagen[now.getDay()]} ${pad(now.getDate())}-${pad(now.getMonth() + 1)}-${now.getFullYear()}`;
    }

    setInterval(updateClock, 1000);
    updateClock(); // Direct uitvoeren zodat er geen 1-seconde vertraging is


    // ─────────────────────────────────────────────
    // 2. AFBEELDINGEN LIJST (lente-thema)
    // ─────────────────────────────────────────────
    const images = [
      'https://images.pexels.com/photos/247408/pexels-photo-247408.jpeg',
      'https://images.pexels.com/photos/34950/pexels-photo.jpg',
      'https://i.ibb.co/7yCKxbh/1289a23e-6273-4ac7-9d44-425ba6d7060f.jpg',
      'https://www.natuurfotografie.nl/wp-content/uploads/2015/03/gewone-pad-portret-1024.jpg',
      'https://i.ibb.co/0R1mSkX6/IMG-20250324-WA0000-2.jpg',
      'https://wallpapers.com/images/hd/4k-spring-flowers-mountain-sun-3hs9mpc4vt1qsgj8.jpg',
      'https://4.bp.blogspot.com/-RkfFZ3fthDs/Uy8YD3cuGGI/AAAAAAAAYf4/R5EIgrR8Dr4/s1600/foto-lente-wallpapers-hd-lente-achtergronden-13-weiland-met-gele-tulpen.jpg',
      'http://2.bp.blogspot.com/-FhJI5av0YU8/Uy8YJQJMHKI/AAAAAAAAYhI/PA9KGJHpSCc/s1600/foto-lente-wallpapers-hd-lente-achtergronden-26-bloemen-roze-tulpen-langs-de-waterkant.jpg',
      'http://4.bp.blogspot.com/-vQPhgjW6Row/Uy8YAm83GrI/AAAAAAAAYfE/pEFEjTvwvvc/s1600/foto-lente-wallpapers-hd-lente-achtergronden-09-roze-bloesem-aan-boom.jpg',
      'https://2.bp.blogspot.com/-37g8mEtoS0U/VS7Enh1RtdI/AAAAAAAAkew/SFPCnJN8VJg/s1600/foto-lente-bureaublad-achtergrond-bloemen.jpg',
      'https://1.bp.blogspot.com/-8jn0OJQILEw/UURwoDVJ1iI/AAAAAAAAOLM/WIkXkLSgoEQ/s1600/lente-achtergrond-met-tulpen-en-vlinders.jpg',
      'https://2.bp.blogspot.com/-HxR-tjiMxNk/T2m_Hhp6P3I/AAAAAAAAcZ4/9KJ8oUm1Ic4/s1600/Lente-achtergronden-hd-lente-wallpapers-voorjaar-wallpaper-14.jpg',
      'https://2.bp.blogspot.com/-GVGfaUnW-ww/Uy8YEIrtkVI/AAAAAAAAYf0/MmKBaTKS_-w/s1600/foto-lente-wallpapers-hd-lente-achtergronden-15-bloemen-in-bloei.jpg',
      'https://3.bp.blogspot.com/-DzHrg13gjGI/UT2zxqKuprI/AAAAAAAAOHM/AGV7r6c_I-c/s1600/lente-achtergrond-met-een-veld-met-verschillende-kleuren-tulpen-en-een-molen-ergens-in-nederland.jpg',
      'https://lh4.googleusercontent.com/-H-YDoVddZU8/TYH9tWalVmI/AAAAAAAAFRY/WBFSl8egJJQ/s1600/Lente-achtergronden-lente-wallpapers-lente-wallpaper-00a-hd.jpg',
      'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixOnkXHgEouf4RmcdZJVgryNnpCOh6jgO4mF7rZ4pDpgEvEfKy1eWZlu0w8XBB_Y7c5IXr93aluAfv0_TPe4lHSuqPZxaRwSBpkkrRdgd75FwL6Hk-iicTBqQ1NdDNRfe3jDfuqQAwWGw/s1600/Lente-achtergronden-hd-lente-wallpapers-voorjaar-wallpaper-18.jpg',
      'https://www.pixelstalk.net/wp-content/uploads/images3/Awesome-Season-Spring-Wallpaper-HD.jpg',
      'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjflXzR9WMoQT0ywOPnWtpWbLUmqUlW10v8cvUFotU0J9RdD38pU_-jC_06957DNq1K2FbDi8SIWjSnqhfxGESeYLZ5ppwJiwyY2a_sMkRa1C1llsICdBU4UQtzdQF6lOn_jprWEE6tG-Y/s1600/Lente-achtergronden-hd-lente-wallpapers-voorjaar-wallpaper-22.jpg',
      'https://2.bp.blogspot.com/-3XjGXwGqM6E/T2m_E1mJfII/AAAAAAAAcZw/VdoUqX1NqLs/s1600/Lente-achtergronden-hd-lente-wallpapers-voorjaar-wallpaper-13.jpg',
      'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjiKOeSR94-fWfacLWZ2TaA0Y9okQ-399HDprkwIMlxiLcgAVtUfZrCSXpbU6cQxmnKKGsAEApO9oQalZr2bk_Kzqnn3py0SvFq8yWhFIZUY_xAxzgGKifH5MuQER9dF4_XDdAi_qXT9GI/s1600/Lente-achtergronden-hd-lente-wallpapers-voorjaar-wallpaper-23.jpg',
      'https://wallpapercave.com/wp/wp5826732.jpg',
      'https://wallpapercave.com/wp/sbj36AD.jpg',
      'http://wallpapercave.com/wp/GbWrVE4.jpg',
      'https://wallpapercave.com/wp/97BVtB3.jpg',
      'https://vsthemes.org/uploads/posts/2021-05/1621872443_skrinshot-24-05-2021-21_06_25.webp'
    ];

    // ─────────────────────────────────────────────
    // 3. ARRAY SCHUDDEN (Fisher-Yates algoritme)
    //    Zodat de volgorde elke keer anders is
    // ─────────────────────────────────────────────
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }
    shuffleArray(images);

    // ─────────────────────────────────────────────
    // 4. AFBEELDINGEN PRELOADEN
    //    Zodat er geen laadvertraging is bij het wisselen
    // ─────────────────────────────────────────────
    images.forEach(src => {
      const img = new Image();
      img.src = src;
    });

    // ─────────────────────────────────────────────
    // 5. ACHTERGROND WISSELEN
    //    Richting: 1 = vooruit, -1 = achteruit
    // ─────────────────────────────────────────────
    let currentIndex = 0;
    const bg1 = document.getElementById('background1');
    const bg2 = document.getElementById('background2');

    function changeBackground(direction = 1) {
      // Index berekenen (met wrap-around)
      currentIndex = (currentIndex + direction + images.length) % images.length;
      const nextImage = `url("${images[currentIndex]}")`;

      // Wissel de actieve laag
      if (bg1.classList.contains('active')) {
        bg2.style.backgroundImage = nextImage;
        bg2.classList.add('active');
        bg1.classList.remove('active');
      } else {
        bg1.style.backgroundImage = nextImage;
        bg1.classList.add('active');
        bg2.classList.remove('active');
      }

    }

    // Eerste afbeelding direct instellen
    bg1.style.backgroundImage = `url("${images[0]}")`;
    bg2.style.backgroundImage = `url("${images[1]}")`;
    // Auto-wisselen elke 90 seconden
    let autoSlideTimer = setInterval(() => changeBackground(1), 90000);

    // Auto-timer resetten na handmatige navigatie
    function manualNavigate(direction) {
      clearInterval(autoSlideTimer);
      autoSlideTimer = setInterval(() => changeBackground(1), 90000);
      changeBackground(direction);

      // Kort flash-effect
      const flash = document.getElementById('flash');
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 150);
    }

    // ─────────────────────────────────────────────
    // 6. TOETSENBORD NAVIGATIE
    //    Spatie / Pijl rechts → volgende afbeelding
    //    Pijl links → vorige afbeelding
    // ─────────────────────────────────────────────
    document.addEventListener('keydown', function(e) {
      // Voorkom dat de pagina scrollt bij spatie
      if (e.code === 'Space') {
        e.preventDefault();
        manualNavigate(1);
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        manualNavigate(1);
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        manualNavigate(-1);
      }
    });

    // ─────────────────────────────────────────────
    // 7. CURSOR GEDRAG
    //    Cursor verdwijnt na 10 seconden inactiviteit
    //    Sluit-knop toont/verbergt mee
    // ─────────────────────────────────────────────
    let cursorTimeout;
    const exitBtn = document.getElementById('exit');

    function showCursor() {
      document.body.classList.add('show-cursor');
      exitBtn.style.display = 'block';
      clearTimeout(cursorTimeout);
      cursorTimeout = setTimeout(hideCursor, 10000);
    }

    function hideCursor() {
      document.body.classList.remove('show-cursor');
      exitBtn.style.display = 'none';
    }

    document.addEventListener('mousemove', showCursor);
    // Direct verbergen na 10 seconden als er geen beweging is
    cursorTimeout = setTimeout(hideCursor, 10000);

    // ─────────────────────────────────────────────
    // 8. FULLSCREEN FUNCTIONALITEIT
    // ─────────────────────────────────────────────
    function openFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen)              el.requestFullscreen();
      else if (el.mozRequestFullScreen)      el.mozRequestFullScreen();
      else if (el.webkitRequestFullscreen)   el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen)       el.msRequestFullscreen();
    }

    function closeFullscreen() {
      if (document.exitFullscreen)            document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      else if (document.msExitFullscreen)     document.msExitFullscreen();
    }

    // ─────────────────────────────────────────────
    // 9. MODAL — tonen bij laden, verwerken knoppen
    // ─────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      const modal = document.getElementById('fullscreenModal');
      modal.style.display = 'flex';

      document.getElementById('yesButton').addEventListener('click', function() {
        openFullscreen();
        modal.style.display = 'none';
      });

      document.getElementById('noButton').addEventListener('click', function() {
        modal.style.display = 'none';
      });
    });

    // ─────────────────────────────────────────────
    // 10. MOBIEL DETECTIE → doorsturen naar mobiele versie
    // ─────────────────────────────────────────────
    window.addEventListener('load', function() {
      if (/Mobi|Android/i.test(navigator.userAgent)) {
        window.location.href = 'https://berkay-blog.glitch.me/mobile.html';
      }
    });
  </script>
</body>
</html>
