<!DOCTYPE html>
<html lang="nl">
<head>
  <title>Screensaver Winter - Berkay Blog</title>
  <meta name="keywords" content="Berkay blog, blog, berkay, De berkay blog, berkay screensaver, screensaver, screensaver berkay blog">
  <meta name="author" content="Berkay">
  <meta name="description" content="Een leuke blog met tips en tricks, gemaakt door Berkay">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="https://i.ibb.co/N6wZw4qN/favicon-32x32.png">
  <!-- Google Fonts: mooie klok-stijl -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* =============================================
       BASIS RESET & FULLSCREEN SETUP
    ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Cursor standaard verborgen (screensaver-stijl) */
      cursor: none;
    }

    /* Cursor zichtbaar maken als muis beweegt */
    body.show-cursor {
      cursor: default;
    }

    /* =============================================
       ACHTERGROND SLIDESHOW
       Twee lagen wisselen elkaar af via opacity-transitie
    ============================================= */
    .background {
      width: 100%;
      height: 100vh;
      background-size: cover;
      background-position: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: -10;
      /* Zachte overgang tussen afbeeldingen */
      transition: opacity 1.5s ease-in-out;
      opacity: 0;
    }

    /* Actieve achtergrond is zichtbaar */
    .background.active {
      opacity: 1;
      z-index: -1;
    }

    /* =============================================
       KLOK & DATUM
    ============================================= */
    #clock-container {
      position: fixed;
      top: 30px;
      left: 40px;
      z-index: 100;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7), 0 0 40px rgba(0,0,0,0.4);
      user-select: none;
    }

    #clock {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 4px;
      line-height: 1;
    }

    #date {
      font-family: 'Quicksand', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2px;
      margin-top: 6px;
    }

    /* =============================================
       SLUIT-KNOP (verschijnt als muis beweegt)
    ============================================= */
    #exit {
      display: none;
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10000000;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      opacity: 0.8;
    }

    #exit:hover {
      transform: scale(1.15) rotate(5deg);
      opacity: 1;
    }

    /* =============================================
       FULLSCREEN MODAL
    ============================================= */
    #fullscreenModal {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .modal-content {
      background: rgba(255,255,255,0.95);
      padding: 32px 28px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
      max-width: 320px;
      width: 90%;
      font-family: 'Quicksand', sans-serif;
    }

    .modal-content p {
      font-size: 1rem;
      color: #222;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .modal-buttons button {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #yesButton {
      background: #4a90c4;
      color: white;
    }

    #yesButton:hover {
      background: #357aad;
      transform: scale(1.04);
    }

    #noButton {
      background: #e0e0e0;
      color: #333;
    }

    #noButton:hover {
      background: #bdbdbd;
      transform: scale(1.04);
    }

    /* =============================================
       FLASH EFFECT bij spatie-druk (kort wit flits)
    ============================================= */
    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      z-index: 5000;
      pointer-events: none;
      transition: opacity 0.08s ease-out;
    }

    #flash.active {
      opacity: 0.18;
    }
  </style>
</head>
<body>

  <!-- =============================================
       SLUIT-KNOP (zichtbaar als muis beweegt)
  ============================================= -->
  <div id="exit" onclick="closeFullscreen();" title="Volledig scherm verlaten">
    <img src="https://i.ibb.co/PY4WLf7/kruis.png" width="44px" height="44px" alt="Sluiten">
  </div>

  <!-- =============================================
       ACHTERGRONDEN (twee lagen voor cross-fade)
  ============================================= -->
  <div id="background1" class="background active"></div>
  <div id="background2" class="background"></div>

  <!-- Flash-overlay voor spatie-effect -->
  <div id="flash"></div>

  <!-- =============================================
       KLOK & DATUM
  ============================================= -->
  <div id="clock-container">
    <div id="clock"></div>
    <div id="date"></div>
  </div>

  <!-- =============================================
       FULLSCREEN MODAL
  ============================================= -->
  <div id="fullscreenModal">
    <div class="modal-content">
      <p>❄️ Wil je de screensaver in <strong>fullscreen</strong> bekijken?<br><small>Dit is aanbevolen voor de beste ervaring.</small></p>
      <div class="modal-buttons">
        <button id="yesButton">⛶ Fullscreen</button>
        <button id="noButton">Overslaan</button>
      </div>
    </div>
  </div>

  <!-- =============================================
       HOOFD JAVASCRIPT
  ============================================= -->
  <script>
    // ─────────────────────────────────────────────
    // 1. KLOK & DATUM — elke seconde bijwerken
    // ─────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');

      // Tijdformaat: UU:MM:SS
      document.getElementById('clock').textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

      // Datumformaat: Dag DD-MM-JJJJ
      const dagen = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
      document.getElementById('date').textContent =
        `${dagen[now.getDay()]} ${pad(now.getDate())}-${pad(now.getMonth() + 1)}-${now.getFullYear()}`;
    }

    setInterval(updateClock, 1000);
    updateClock(); // Direct uitvoeren zodat er geen 1-seconde vertraging is


    // ─────────────────────────────────────────────
    // 2. AFBEELDINGEN LIJST (winter-thema)
    // ─────────────────────────────────────────────
    const images = [
      'url("https://images.pexels.com/photos/247408/pexels-photo-247408.jpeg")',
      'url("https://tse2.mm.bing.net/th/id/OIP.Jasc01ejTZSX74DRxkbrmAHaEK?pid=Api")',
      'url("https://i.ibb.co/7yCKxbh/1289a23e-6273-4ac7-9d44-425ba6d7060f.jpg")',
      'url("https://www.natuurfotografie.nl/wp-content/uploads/2015/03/gewone-pad-portret-1024.jpg")',
      'url("https://tse1.mm.bing.net/th/id/OIP.-K3pppnpf53TWMqQo0043QHaE8?cb=ucfimg2&pid=Api&ucfimg=1")',
      'url("https://tse1.mm.bing.net/th/id/OIP.QM88BpJzhhMgJqBU5QG3xQHaEK?cb=ucfimg2&pid=Api&ucfimg=1")',
      'url("https://tse2.mm.bing.net/th/id/OIP.ii5OlYhjroFwHnh87EttTgHaEK?cb=ucfimg2&pid=Api&ucfimg=1")',
      'url("https://media.idownloadblog.com/wp-content/uploads/2018/12/snowing-tree-blue-christmas-winter-nature-mountain-imac-27.jpg")',
      'url("https://tse2.mm.bing.net/th/id/OIP.0PPWwu7pcXMC3ARlsjBWfQHaEo?cb=ucfimg2&pid=Api&ucfimg=1")',
      'url("https://tse3.mm.bing.net/th/id/OIP.AX5b8r6iTAc1rHnb-F_iogHaEK?cb=ucfimg2&pid=Api&ucfimg=1")',
      'url("https://tse3.mm.bing.net/th/id/OIP.dVvpusgtPBk0AZeOtn9c1QHaEo?cb=ucfimg2&pid=Api&ucfimg=1")',
      'url("https://tse2.mm.bing.net/th/id/OIP.MltgnxWAQDf0XG1GRdW8rgHaEK?cb=ucfimg2&pid=Api&ucfimg=1")',
      'url("https://tse1.mm.bing.net/th/id/OIP.9nwRjUA029vQfGpNOCbs8gHaEK?cb=ucfimg2&pid=Api&ucfimg=1")',
      'url("https://tse3.mm.bing.net/th/id/OIP.h8TJXl8l3zbOegh7f22B5gHaEK?cb=ucfimg2&pid=Api&ucfimg=1")',
      'url("https://tse4.mm.bing.net/th/id/OIP.HmzF5o4gR6-OOx_59MXL4wHaFj?cb=ucfimg2&pid=Api&ucfimg=1")',
      'url("https://tse4.mm.bing.net/th?id=OIP.E7AT-rTMLkoWcoaKzn8UPwHaEK&pid=Api")',
      'url("https://tse2.mm.bing.net/th?id=OIP.Hp_HQqmbbEM2c1dcwnOMOgHaEK&pid=Api")',
      'url("https://tse1.mm.bing.net/th?id=OIP.eO9-AxYoxEDHpHX9a_o7PAHaFQ&pid=Api")'
    ];

    // ─────────────────────────────────────────────
    // 3. ARRAY SCHUDDEN (Fisher-Yates algoritme)
    //    Zodat de volgorde elke keer anders is
    // ─────────────────────────────────────────────
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }
    shuffleArray(images);

    // ─────────────────────────────────────────────
    // 4. AFBEELDINGEN PRELOADEN
    //    Zodat er geen laadvertraging is bij het wisselen
    // ─────────────────────────────────────────────
    images.forEach(src => {
      const img = new Image();
      img.src = src.slice(5, -2); // Verwijder 'url("' en '")'
    });

    // ─────────────────────────────────────────────
    // 5. ACHTERGROND WISSELEN
    //    Richting: 1 = vooruit, -1 = achteruit
    // ─────────────────────────────────────────────
    let currentIndex = 0;
    const bg1 = document.getElementById('background1');
    const bg2 = document.getElementById('background2');

    function changeBackground(direction = 1) {
      // Index berekenen met wrap-around
      currentIndex = (currentIndex + direction + images.length) % images.length;
      const nextImage = images[currentIndex];

      // Wissel de actieve laag
      if (bg1.classList.contains('active')) {
        bg2.style.backgroundImage = nextImage;
        bg2.classList.add('active');
        bg1.classList.remove('active');
      } else {
        bg1.style.backgroundImage = nextImage;
        bg1.classList.add('active');
        bg2.classList.remove('active');
      }
    }

    // Eerste afbeelding direct instellen
    bg1.style.backgroundImage = images[0];
    bg2.style.backgroundImage = images[1];

    // Auto-wisselen elke 90 seconden
    let autoSlideTimer = setInterval(() => changeBackground(1), 90000);

    // Auto-timer resetten na handmatige navigatie
    function manualNavigate(direction) {
      clearInterval(autoSlideTimer);
      autoSlideTimer = setInterval(() => changeBackground(1), 90000);
      changeBackground(direction);

      // Kort flash-effect
      const flash = document.getElementById('flash');
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 150);
    }

    // ─────────────────────────────────────────────
    // 6. TOETSENBORD NAVIGATIE
    //    Spatie / Pijl rechts → volgende afbeelding
    //    Pijl links → vorige afbeelding
    // ─────────────────────────────────────────────
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space') {
        e.preventDefault(); // Voorkom scrollen
        manualNavigate(1);
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        manualNavigate(1);
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        manualNavigate(-1);
      }
    });

    // ─────────────────────────────────────────────
    // 7. CURSOR GEDRAG
    //    Cursor verdwijnt na 10 seconden inactiviteit
    // ─────────────────────────────────────────────
    let cursorTimeout;
    const exitBtn = document.getElementById('exit');

    function showCursor() {
      document.body.classList.add('show-cursor');
      exitBtn.style.display = 'block';
      clearTimeout(cursorTimeout);
      cursorTimeout = setTimeout(hideCursor, 10000);
    }

    function hideCursor() {
      document.body.classList.remove('show-cursor');
      exitBtn.style.display = 'none';
    }

    document.addEventListener('mousemove', showCursor);
    cursorTimeout = setTimeout(hideCursor, 10000);

    // ─────────────────────────────────────────────
    // 8. FULLSCREEN FUNCTIONALITEIT
    // ─────────────────────────────────────────────
    function openFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen)            el.requestFullscreen();
      else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen)     el.msRequestFullscreen();
    }

    function closeFullscreen() {
      if (document.exitFullscreen)            document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      else if (document.msExitFullscreen)     document.msExitFullscreen();
    }

    // ─────────────────────────────────────────────
    // 9. MODAL — tonen bij laden, verwerken knoppen
    // ─────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      const modal = document.getElementById('fullscreenModal');
      modal.style.display = 'flex';

      document.getElementById('yesButton').addEventListener('click', function() {
        openFullscreen();
        modal.style.display = 'none';
      });

      document.getElementById('noButton').addEventListener('click', function() {
        modal.style.display = 'none';
      });
    });

    // ─────────────────────────────────────────────
    // 10. MOBIEL DETECTIE → doorsturen naar mobiele versie
    // ─────────────────────────────────────────────
    window.addEventListener('load', function() {
      if (/Mobi|Android/i.test(navigator.userAgent)) {
        window.location.href = 'https://berkay-blog.glitch.me/mobile.html';
      }
    });
  </script>
</body>
</html>
